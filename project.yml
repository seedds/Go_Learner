name: GoLearner
options:
  bundleIdPrefix: com.golearner
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  # C/C++ headers are resolved via HEADER_SEARCH_PATHS, not a build phase. Keep
  # them out of any Headers/CopyFiles phase so the vendored engine's duplicate
  # header basenames (e.g. fp16.h in FP16 + mlx) don't collide when a static
  # library would otherwise try to flatten them into one include dir.
  fileTypes:
    h: { buildPhase: none }
    hpp: { buildPhase: none }
    hxx: { buildPhase: none }
    inc: { buildPhase: none }
    ipp: { buildPhase: none }

# Local SwiftPM package: the vendored mlx-swift fork (Cmlx C++ core + MLX Swift
# libs). Consumed by the katago engine's MLX backend. See Engine/katago/UPSTREAM.txt.
packages:
  mlx-swift:
    path: Engine/katago/ThirdParty/mlx-swift

settings:
  base:
    SWIFT_VERSION: "6.0"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_CXX_LIBRARY: "libc++"
    # The vendored engine has upstream warnings (e.g. deprecated sprintf); don't
    # let them fail the build.
    GCC_WARN_INHIBIT_ALL_WARNINGS: YES
    # The katago static lib's generated "Copy Swift Objective-C Interface Header"
    # phase runs `ditto` into $(BUILT_PRODUCTS_DIR)/include/katago/. User-script
    # sandboxing denies ditto's temp-file create there. Pin OFF so regeneration
    # (and Xcode's "update to recommended settings") can't re-break the build.
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  # ---------------------------------------------------------------------------
  # KataGoSwift — the Swift⇄C++ interop framework the MLX backend calls into for
  # the CoreML/ANE mux (MetalComputeContext / CoreMLComputeHandle). Built with
  # objcxx interop so it emits a C++-visible `KataGoSwift-swift.h` that the
  # engine's mlxbackend.cpp #includes. Foundation/CoreML/MPS only — no engine
  # dependency, so the dependency graph stays acyclic (MLX → KataGoSwift →
  # katago → app).
  # ---------------------------------------------------------------------------
  KataGoSwift:
    type: framework
    platform: iOS
    sources:
      - path: Engine/katago/KataGoSwift
    settings:
      base:
        PRODUCT_NAME: KataGoSwift
        DEFINES_MODULE: YES
        SWIFT_OBJC_INTEROP_MODE: objcxx
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
        CLANG_ENABLE_MODULES: YES
        GENERATE_INFOPLIST_FILE: YES

  # ---------------------------------------------------------------------------
  # katago — the full vendored KataGo engine (rules + search + native SGF + the
  # MLX/CoreML neural-net backend) as a static library. Compiles the pruned
  # cpp/ tree (engine + the abseil/protobuf/katagocoreml subset the CoreML
  # converter needs). Header/preprocessor recipe mirrors the reference
  # 'katago' framework target. Links MLX + KataGoSwift.
  # ---------------------------------------------------------------------------
  katago:
    type: library.static
    platform: iOS
    sources:
      - path: Engine/katago/cpp
    dependencies:
      - target: KataGoSwift
      - package: mlx-swift
        product: MLX
      # desc.cpp / fileutils.cpp / the katagocoreml parser read .bin.gz via zlib.
      - sdk: libz.tbd
    settings:
      base:
        PRODUCT_NAME: katago
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_ENABLE_MODULES: YES
        # objcxx so the C++ TUs can import the KataGoSwift framework module and
        # its generated C++ interop header (<KataGoSwift/KataGoSwift-swift.h>).
        SWIFT_OBJC_INTEROP_MODE: objcxx
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "USE_MLX_BACKEND=1"
          - "NO_LIBZIP=1"
          - "NO_GIT_REVISION=1"
          - "OS_IS_IOS=1"
          - "COMPILE_MAX_BOARD_LEN=37"
        # Mirror the reference target's HEADER_SEARCH_PATHS + SYSTEM_HEADER_SEARCH_PATHS.
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Engine/katago/cpp"
          - "$(SRCROOT)/Engine/katago/cpp/external/tclap-1.2.5/include"
          - "$(SRCROOT)/Engine/katago/cpp/external"
          - "$(SRCROOT)/Engine/katago/cpp/external/filesystem-1.5.8/include"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/include"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/generated"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/mlmodel/format"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/mlmodel/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/modelpackage/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/deps/FP16/include"
          - "$(SRCROOT)/Engine/katago/cpp/external/nlohmann_json"
          - "$(SRCROOT)/Engine/katago/cpp/external/protobuf-34/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/protobuf-34/third_party/utf8_range"
          - "$(SRCROOT)/Engine/katago/cpp/external/abseil-cpp-20260107"
          - "$(SRCROOT)/Engine/katago/ThirdParty/mlx-swift/Source/Cmlx/mlx"
          - "$(SRCROOT)/Engine/katago/ThirdParty/mlx-swift/Source/Cmlx/mlx-c"

  # ---------------------------------------------------------------------------
  # GoLearner — the app. Drives the full vendored KataGo engine in-process over
  # GTP (via GameSession/InProcessKataGoEngine) and renders positions from the
  # stateless GoReplay bridge. Links libkatago.a + KataGoSwift + MLX; bundles the
  # b18c384nbt net + gtp.cfg.
  # ---------------------------------------------------------------------------
  GoLearner:
    type: application
    platform: iOS
    sources:
      - path: GoLearner
      - path: Engine/Bridge
      - path: Resources/default_model.bin.gz
        buildPhase: resources
      - path: Resources/default_gtp.cfg
        buildPhase: resources
    dependencies:
      # katago (static lib) pulls in MLX + KataGoSwift transitively.
      - target: katago
      - target: KataGoSwift
        embed: true
      - sdk: libz.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.golearner.app
        SWIFT_OBJC_BRIDGING_HEADER: "Engine/Bridge/GoLearner-Bridging-Header.h"
        # Swift/C++ interop: the app imports the KataGoSwift objcxx module and the
        # ObjC++ engine bridges; @testable host for GoLearnerTests needs it too.
        SWIFT_OBJC_INTEROP_MODE: objcxx
        ENABLE_TESTABILITY: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
        # The ObjC++ engine bridges (#include "main.h") need the engine core on
        # the header path.
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Engine/katago/cpp"
          - "$(SRCROOT)/Engine/katago/cpp/core"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "NO_GIT_REVISION=1"
          - "OS_IS_IOS=1"
          - "COMPILE_MAX_BOARD_LEN=37"

  # Unit + integration tests, hosted by the app so the engine's CoreML inference
  # (Swift Concurrency + GCD) runs in a real app process. Pure tests (SGF, GTP
  # parsers, handicap) plus GoReplay-backed (thumbnails, GIF) plus the live
  # engine smoke test via `@testable import GoLearner`.
  GoLearnerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GoLearnerTests
    dependencies:
      - target: GoLearner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.golearner.tests
        SWIFT_OBJC_INTEROP_MODE: objcxx
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GoLearner.app/GoLearner"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  GoLearner:
    build:
      targets:
        GoLearner: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GoLearnerTests
  # Standalone scheme to build/validate the vendored engine in isolation.
  katago:
    build:
      targets:
        katago: all
