name: GoLearner
options:
  bundleIdPrefix: com.golearner
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  # C/C++ headers are resolved via HEADER_SEARCH_PATHS, not a build phase. Keep
  # them out of any Headers/CopyFiles phase so the vendored engine's duplicate
  # header basenames (e.g. fp16.h in FP16 + mlx) don't collide when a static
  # library would otherwise try to flatten them into one include dir.
  fileTypes:
    h: { buildPhase: none }
    hpp: { buildPhase: none }
    hxx: { buildPhase: none }
    inc: { buildPhase: none }
    ipp: { buildPhase: none }

# Local SwiftPM package: the vendored mlx-swift fork (Cmlx C++ core + MLX Swift
# libs). Consumed by the katago engine's MLX backend. See Engine/katago/UPSTREAM.txt.
packages:
  mlx-swift:
    path: Engine/katago/ThirdParty/mlx-swift

settings:
  base:
    SWIFT_VERSION: "6.0"
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
    CLANG_CXX_LIBRARY: "libc++"
    # Vendored KataGo C++ subset needs these on the header search path and the
    # same preprocessor defines used to verify it compiles (see ARCHITECTURE.md).
    HEADER_SEARCH_PATHS:
      - "$(SRCROOT)/Engine/cpp"
      - "$(SRCROOT)/Engine/cpp/core"
      - "$(SRCROOT)/Engine/cpp/game"
      - "$(SRCROOT)/Engine/cpp/neuralnet"
    GCC_PREPROCESSOR_DEFINITIONS:
      - "$(inherited)"
      - "NO_GIT_REVISION=1"
      - "OS_IS_IOS=1"
    # The engine subset has upstream warnings (e.g. deprecated sprintf); don't
    # let them fail the build.
    GCC_WARN_INHIBIT_ALL_WARNINGS: YES

targets:
  # ---------------------------------------------------------------------------
  # KataGoSwift — the Swift⇄C++ interop framework the MLX backend calls into for
  # the CoreML/ANE mux (MetalComputeContext / CoreMLComputeHandle). Built with
  # objcxx interop so it emits a C++-visible `KataGoSwift-swift.h` that the
  # engine's mlxbackend.cpp #includes. Foundation/CoreML/MPS only — no engine
  # dependency, so the dependency graph stays acyclic (MLX → KataGoSwift →
  # katago → app).
  # ---------------------------------------------------------------------------
  KataGoSwift:
    type: framework
    platform: iOS
    sources:
      - path: Engine/katago/KataGoSwift
    settings:
      base:
        PRODUCT_NAME: KataGoSwift
        DEFINES_MODULE: YES
        SWIFT_OBJC_INTEROP_MODE: objcxx
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
        CLANG_ENABLE_MODULES: YES
        GENERATE_INFOPLIST_FILE: YES

  # ---------------------------------------------------------------------------
  # katago — the full vendored KataGo engine (rules + search + native SGF + the
  # MLX/CoreML neural-net backend) as a static library. Compiles the pruned
  # cpp/ tree (engine + the abseil/protobuf/katagocoreml subset the CoreML
  # converter needs). Header/preprocessor recipe mirrors the reference
  # 'katago' framework target. Links MLX + KataGoSwift.
  # ---------------------------------------------------------------------------
  katago:
    type: library.static
    platform: iOS
    sources:
      - path: Engine/katago/cpp
    dependencies:
      - target: KataGoSwift
      - package: mlx-swift
        product: MLX
      # desc.cpp / fileutils.cpp / the katagocoreml parser read .bin.gz via zlib.
      - sdk: libz.tbd
    settings:
      base:
        PRODUCT_NAME: katago
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_ENABLE_MODULES: YES
        # objcxx so the C++ TUs can import the KataGoSwift framework module and
        # its generated C++ interop header (<KataGoSwift/KataGoSwift-swift.h>).
        SWIFT_OBJC_INTEROP_MODE: objcxx
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "USE_MLX_BACKEND=1"
          - "NO_LIBZIP=1"
          - "NO_GIT_REVISION=1"
          - "OS_IS_IOS=1"
          - "COMPILE_MAX_BOARD_LEN=37"
        # Mirror the reference target's HEADER_SEARCH_PATHS + SYSTEM_HEADER_SEARCH_PATHS.
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Engine/katago/cpp"
          - "$(SRCROOT)/Engine/katago/cpp/external/tclap-1.2.5/include"
          - "$(SRCROOT)/Engine/katago/cpp/external"
          - "$(SRCROOT)/Engine/katago/cpp/external/filesystem-1.5.8/include"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/include"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/generated"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/mlmodel/format"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/mlmodel/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/modelpackage/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/katagocoreml/vendor/deps/FP16/include"
          - "$(SRCROOT)/Engine/katago/cpp/external/nlohmann_json"
          - "$(SRCROOT)/Engine/katago/cpp/external/protobuf-34/src"
          - "$(SRCROOT)/Engine/katago/cpp/external/protobuf-34/third_party/utf8_range"
          - "$(SRCROOT)/Engine/katago/cpp/external/abseil-cpp-20260107"
          - "$(SRCROOT)/Engine/katago/ThirdParty/mlx-swift/Source/Cmlx/mlx"
          - "$(SRCROOT)/Engine/katago/ThirdParty/mlx-swift/Source/Cmlx/mlx-c"

  # ---------------------------------------------------------------------------
  # GoLearner — the app. Still built on the legacy Engine/cpp slice + bridge
  # until T4 repoints it at the katago engine over GTP. (The katago/KataGoSwift
  # targets above are validated independently in T1b before the pivot.)
  # ---------------------------------------------------------------------------
  GoLearner:
    type: application
    platform: iOS
    sources:
      - path: GoLearner
      - path: Engine/Bridge
        # The new GTP bridge + its in-process transport belong to the full-engine
        # targets (EngineHost), not the legacy app, which still links the
        # Engine/cpp slice. They get wired into the app at T4.
        excludes:
          - "KataGoGTP.h"
          - "KataGoGTP.mm"
          - "KataGoEngine-Bridging-Header.h"
          - "InProcessKataGoEngine.swift"
      - path: Engine/cpp
        # Headers + .cpp compiled into the app; json.hpp is header-only.
      - path: Resources/KataGoModel19x19fp16.mlpackage
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.golearner.app
        SWIFT_OBJC_BRIDGING_HEADER: "Engine/Bridge/GoLearner-Bridging-Header.h"
        # We load the model via the generic MLModel API by URL, so we don't need
        # (or want) an auto-generated Swift wrapper class.
        COREML_CODEGEN_LANGUAGE: "None"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"

  # ---------------------------------------------------------------------------
  # EngineHost — minimal app that links the FULL vendored engine (libkatago.a +
  # KataGoSwift + MLX) and the KataGoGTP bridge, and bundles the real
  # b18c384nbt net + stripped gtp.cfg. It hosts EngineSmokeTests so the engine's
  # CoreML inference (Swift Concurrency + GCD) runs in a real app process, not a
  # hostless XCTest bundle (where the NN-server threads crash). NOT the app the
  # user ships — GoLearner stays on the legacy slice until T4.
  # ---------------------------------------------------------------------------
  EngineHost:
    type: application
    platform: iOS
    sources:
      - path: EngineHost
      - path: Engine/Bridge/KataGoGTP.h
      - path: Engine/Bridge/KataGoGTP.mm
      - path: Engine/Bridge/InProcessKataGoEngine.swift
      # Shared pure Swift seam (also compiled into the app); the hosted smoke
      # tests reach these through `@testable import EngineHost`.
      - path: GoLearner/KataGoEngineIO.swift
      - path: GoLearner/GtpCommandBuilder.swift
      - path: GoLearner/GtpAnalysisParser.swift
      - path: GoLearner/GameSession.swift
      - path: Resources/default_model.bin.gz
        buildPhase: resources
      - path: Resources/default_gtp.cfg
        buildPhase: resources
    dependencies:
      # katago (static lib) already pulls in MLX + KataGoSwift transitively.
      - target: katago
      - target: KataGoSwift
        embed: true
      - sdk: libz.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.golearner.enginehost
        SWIFT_OBJC_BRIDGING_HEADER: "Engine/Bridge/KataGoEngine-Bridging-Header.h"
        SWIFT_OBJC_INTEROP_MODE: objcxx
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        # Let the hosted smoke tests reach the seam via @testable import EngineHost.
        ENABLE_TESTABILITY: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Engine/katago/cpp"
          - "$(SRCROOT)/Engine/katago/cpp/core"
        GCC_PREPROCESSOR_DEFINITIONS:
          - "$(inherited)"
          - "NO_GIT_REVISION=1"
          - "OS_IS_IOS=1"
          - "COMPILE_MAX_BOARD_LEN=37"

  # T2 + T3 gate: hosted by EngineHost so inference runs in a real app process.
  # Reaches the engine seam via `@testable import EngineHost`.
  EngineSmokeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: EngineSmokeTests
    dependencies:
      - target: EngineHost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.golearner.enginesmoke
        # @testable import of the objcxx EngineHost module requires the test
        # compilation to also enable Swift/C++ interop.
        SWIFT_OBJC_INTEROP_MODE: objcxx
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/EngineHost.app/EngineHost"
        BUNDLE_LOADER: "$(TEST_HOST)"

  GoLearnerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: GoLearnerTests
      # Standalone logic bundle (no test host) that compiles the bridge + C++
      # subset itself, so it can exercise the correctness-critical engine path
      # directly without a duplicate-class clash against the app host.
      - path: Engine/Bridge
        excludes:
          - "KataGoGTP.h"
          - "KataGoGTP.mm"
          - "KataGoEngine-Bridging-Header.h"
          - "InProcessKataGoEngine.swift"
      - path: Engine/cpp
      # Search + its value types (no CoreML dependency).
      - path: GoLearner/NNResult.swift
      - path: GoLearner/MCTS.swift
      # Pure SGF codec (Foundation + GoColor only).
      - path: GoLearner/SGF.swift
      # Pure GTP command builder + kata-analyze parser (Foundation only).
      - path: GoLearner/GtpCommandBuilder.swift
      - path: GoLearner/GtpAnalysisParser.swift
      # Fixed handicap placement table (Foundation + SGFPoint only).
      - path: GoLearner/HandicapPoints.swift
      # SGF → board replay (uses the bridge, no CoreML).
      - path: GoLearner/BoardReconstruction.swift
      # GIF rendering (CoreGraphics/ImageIO only; frames() uses the bridge).
      - path: GoLearner/GameGIF.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.golearner.tests
        SWIFT_OBJC_BRIDGING_HEADER: "Engine/Bridge/GoLearner-Bridging-Header.h"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  GoLearner:
    build:
      targets:
        GoLearner: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GoLearnerTests
  # Standalone scheme to build/validate the vendored engine in isolation (T1b).
  katago:
    build:
      targets:
        katago: all
  # T2 gate: build + run the in-process GTP smoke test against the full engine.
  EngineSmokeTests:
    build:
      targets:
        EngineSmokeTests: all
    test:
      config: Debug
      targets:
        - EngineSmokeTests
